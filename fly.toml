app = "foedus-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.web"

[env]
  FOEDUS_DATABASE_URL = "sqlite:////data/foedus_web.db"
  FOEDUS_BASE_URL = "https://foedus-web.fly.dev"

[[mounts]]
  source = "foedus_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
