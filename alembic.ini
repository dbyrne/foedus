[alembic]
script_location = migrations
# overridden at runtime by env.py via foedus.web.config.get_settings()
sqlalchemy.url = sqlite:///./foedus_web.db

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
